apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-demo-deployment
  namespace: production
  labels:
    app: cicd-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cicd-demo
    spec:
      containers:
        - name: cicd-demo-container
          image: YOUR_DOCKERHUB_USERNAME/cicd-demo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-demo-service
  namespace: production
spec:
  selector:
    app: cicd-demo
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
  type: NodePort
